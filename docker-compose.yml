# Docker Compose file for Project EstimaPro

services:
  nginx:
    image: nginx:alpine
    container_name: proyecto-estimacion-soft-frontend-1
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proyecto-estimacion-soft-backend-1
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - .env.docker
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: proyecto-estimacion-soft-mongo-1
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret123}
      MONGO_INITDB_DATABASE: estimacion-dev
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_ROOT_USER:-admin}", "--password", "${MONGO_ROOT_PASS:-secret123}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Servicio seed — se ejecuta UNA vez y termina
  seeder:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proyecto-estimacion-soft-seeder-1
    command: ["node", "dist/seed.js"]
    env_file:
      - .env.docker
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"   # Solo corre una vez

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
