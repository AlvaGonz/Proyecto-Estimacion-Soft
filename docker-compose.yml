services:
  mongodb:
    image: mongo:8.0
    container_name: estimacion-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js
    environment:
      - MONGO_INITDB_DATABASE=Proyecto-Estimacion-Soft

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: estimacion-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/Proyecto-Estimacion-Soft
      - JWT_ACCESS_SECRET=supersecretaccess12345678901234567890
      - JWT_REFRESH_SECRET=supersecretrefresh12345678901234567890
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - ALLOWED_ORIGINS=http://localhost:3000
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads
    entrypoint: ["/app/entrypoint.sh"]
    command: ["npm", "run", "dev"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estimacion-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules

  migrations:
    build:
      context: ./server
      dockerfile: Dockerfile.migrations
    container_name: estimacion-migrations
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/Proyecto-Estimacion-Soft
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./run-seeds.sh:/app/run-seeds.sh
    # This container exits after running seeds

volumes:
  mongodb_data:
