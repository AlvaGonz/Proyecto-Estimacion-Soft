name: CI — EstimaPro

on:
  push:
    branches: [develop, main, 'feature/**', 'chore/**', 'fix/**']
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  VITE_API_URL: http://localhost:3001/api

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Install + Cache
  # ─────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install backend dependencies
        run: cd server && npm ci

  # ─────────────────────────────────────────────
  # JOB 2: Lint / Static Validation
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Frontend lint
        run: npm run lint
      - name: Backend lint
        run: |
          cd server
          npm run lint

  # ─────────────────────────────────────────────
  # JOB 3: Typecheck
  # ─────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Frontend typecheck
        run: npx tsc --noEmit
      - name: Backend typecheck
        run: |
          cd server
          npm ci
          npx tsc --noEmit

  # ─────────────────────────────────────────────
  # JOB 4: Build Frontend
  # ─────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-frontend
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5: Unit Tests + Coverage
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run frontend unit tests with coverage
        run: npx vitest run --coverage
      - name: Run backend unit tests
        run: |
          cd server
          npm run test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 5.5: Audit Log Module Integrity
  # ─────────────────────────────────────────────
  audit-log-integrity:
    name: Audit Log Module Integrity
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: cd server && npm ci
      - name: Validate LOGAUDITORIA module exists
        run: |
          test -f server/src/models/AuditLog.js || test -f server/src/models/AuditLog.ts || test -f server/src/models/AuditLog.model.ts || \
          (echo "LOGAUDITORIA model not found — RNF007 violated" && exit 1)
      - name: Run audit log unit tests
        run: |
          cd server
          npm run test -- --grep "audit|log|trazabilidad" || echo "No specific audit tests found — add them"

  # ─────────────────────────────────────────────
  # JOB 6: E2E Tests (PR validation only)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 7: Docker Compose Validation
  # ─────────────────────────────────────────────
  docker-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker-compose -f docker-compose.yml config
      - name: Build Docker images
        run: docker-compose build
      - name: Test Docker services
        run: |
          docker-compose up -d
          sleep 30
          curl -f http://localhost:3000 || exit 1
          curl -f http://localhost:4000/api/health || exit 1
          docker-compose down

  # ─────────────────────────────────────────────
  # JOB 8: Smoke Test — RF025 Notifications
  # ─────────────────────────────────────────────
  smoke-notifications:
    name: Smoke Test — RF025 Notifications
    runs-on: ubuntu-latest
    needs: [docker-validation]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Bring up docker-compose
        run: docker-compose up -d && sleep 40
      - name: Validate SMTP secrets are present
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
        run: |
          [[ -n "$SMTP_HOST" ]] && echo "SMTP_HOST present" || (echo "Missing SMTP_HOST secret" && exit 1)
          [[ -n "$SMTP_USER" ]] && echo "SMTP_USER present" || (echo "Missing SMTP_USER secret" && exit 1)
      - name: Smoke test notification endpoint
        run: |
          curl -f -X POST http://localhost:4000/api/test-notification \
            -H "Content-Type: application/json" \
            -d '{"type":"test","recipient":"ci@test.local"}' \
            || echo "Notification endpoint not yet implemented — RF025 pending"
      - name: Teardown
        if: always()
        run: docker-compose down
