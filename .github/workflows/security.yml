name: Security Operations (Gaps 1/4)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run npm ci (root)
        run: npm ci
      - name: Run npm audit --audit-level=high (root — frontend)
        run: npm audit --audit-level=high
      - name: Run cd server && npm ci && npm audit --audit-level=high (backend)
        run: |
          cd server
          npm ci
          npm audit --audit-level=high

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repo with fetch-depth: 0"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Use action: trufflesecurity/trufflehog-actions-scan@v3"
        uses: trufflesecurity/trufflehog-actions-scan@v3
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  sast:
    name: Static Application Security Testing (CodeQL)
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: "Use github/codeql-action/init@v3 with languages: ['javascript']"
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: "Use github/codeql-action/autobuild@v3"
        uses: github/codeql-action/autobuild@v3
      - name: "Use github/codeql-action/analyze@v3"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
