name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-title-check:
    name: Conventional Commit PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            test
            ci
            refactor
            perf
          requireScope: false

  branch-name-check:
    name: Branch Name Convention
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(feature|fix|chore|docs|test|ci|refactor)/ ]]; then
            echo "❌ Branch '$BRANCH' no sigue la convención: feature/*, fix/*, chore/*, etc."
            exit 1
          fi
          echo "✅ Branch '$BRANCH' válido"
